name: Publish to npm
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'npm version to publish'
        type: choice
        required: true
        options:
          # These labels must match the keys in the repo-level variable `versions`
          # (Settings → Variables → Actions). Set it to a JSON object like:
          # {"values":{"patch (x.y.z+1, bug fixes)":"patch","minor (x.y+1.0, new functionality)":"minor","major (x+1.0.0, api breaking changes)":"major"}}
          - 'patch (x.y.z+1, bug fixes)'
          - 'minor (x.y+1.0, new functionality)'
          - 'major (x+1.0.0, api breaking changes)'
      dry_run:
        description: 'Dry run (perform all steps except git push & npm publish)'
        type: boolean
        default: true
        required: true
jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - name: Setup versions in ${{ '${{env}}' }}
        run: |
          node scripts/get-publish-versions.js >> "$GITHUB_ENV"
          echo "SEMVER_UPDATE=${{ fromJSON(vars.versions).values[inputs.version] }}" >> "$GITHUB_ENV"
          cat "$GITHUB_ENV"
      - name: Version package
        run: |
          npm version ${{ env.SEMVER_UPDATE }}
          echo "VERSION=$(git show -s --format=%s)" >> "$GITHUB_ENV"
      - name: Amend with changelog
        run: |
          node scripts/generate-changelog.js ${{ env.CURRENT_TAG_VERSION }} ${{ env.VERSION }} ${{ env.SEMVER_UPDATE }} > "${{ runner.temp }}/changelog.txt"
          git commit --amend -F "${{ runner.temp }}/changelog.txt"
          git tag -f -m '${{ env.VERSION }}' 'v${{ env.VERSION }}'
          git show -s --format=%B
      - name: Push new version
        if: inputs.dry_run == false
        run: git push --atomic origin ${{ github.ref_name }} $(git tag --points-at HEAD)
      - name: Publish to npm
        if: inputs.dry_run == false
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
